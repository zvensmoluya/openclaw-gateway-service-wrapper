name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Pester
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -RequiredVersion 5.5.0

      - name: Run tests
        run: |
          Import-Module Pester -RequiredVersion 5.5.0 -Force
          Invoke-Pester -Path .\tests -CI

      - name: Build V2 solution
        run: dotnet build .\agent\OpenClaw.Agent.sln

      - name: Test V2 solution
        run: dotnet test .\agent\tests\OpenClaw.Agent.Tests\OpenClaw.Agent.Tests.csproj

      - name: Publish V2 layout
        run: powershell -ExecutionPolicy Bypass -File .\build-v2.ps1 -Configuration Release

      - name: Build release package
        run: powershell -ExecutionPolicy Bypass -File .\build-release.ps1 -Version $env:GITHUB_REF_NAME

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: |
            dist/*.zip
            dist/v2/win-x64/current/**

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
