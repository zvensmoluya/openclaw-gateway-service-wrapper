name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Pester
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -RequiredVersion 5.5.0

      - name: Parse PowerShell files
        run: |
          $parseErrors = @()
          $files = Get-ChildItem -Path . -Include *.ps1,*.psm1 -File -Recurse
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              foreach ($error in $errors) {
                $parseErrors += "{0}: {1}" -f $file.FullName, $error.Message
              }
            }
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run Pester
        run: |
          Import-Module Pester -RequiredVersion 5.5.0 -Force
          Invoke-Pester -Path .\tests -CI

      - name: Verify test discovery includes key suites
        run: |
          $required = @(
            'Config.Tests.ps1',
            'ConfigSelection.Tests.ps1',
            'Doctor.Tests.ps1',
            'Layout.Tests.ps1',
            'ServiceIdentity.Tests.ps1',
            'Status.Tests.ps1',
            'Template.Tests.ps1'
          )
          $present = Get-ChildItem -Path .\tests -Filter *.Tests.ps1 -File | Select-Object -ExpandProperty Name
          $missing = $required | Where-Object { $_ -notin $present }
          if ($missing.Count -gt 0) {
            throw "Expected test suites were not found in .\\tests: $($missing -join ', ')"
          }

      - name: Build V2 solution
        run: dotnet build .\agent\OpenClaw.Agent.sln

      - name: Test V2 solution
        run: dotnet test .\agent\tests\OpenClaw.Agent.Tests\OpenClaw.Agent.Tests.csproj

      - name: Publish V2 layout
        run: powershell -ExecutionPolicy Bypass -File .\build-v2.ps1 -Configuration Release

      - name: Verify V2 publish layout exists
        run: |
          $required = @(
            '.\dist\v2\win-x64\current\OpenClaw.Agent.Host.exe',
            '.\dist\v2\win-x64\current\OpenClaw.Agent.Cli.exe',
            '.\dist\v2\win-x64\current\config\agent.json.example',
            '.\dist\v2\win-x64\current\README.md'
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            throw "Expected V2 publish outputs were not found: $($missing -join ', ')"
          }

      - name: Build release package
        run: powershell -ExecutionPolicy Bypass -File .\build-release.ps1 -Version ci

      - name: Verify release archive exists
        run: |
          if (-not (Test-Path .\dist\openclaw-gateway-service-wrapper-ci.zip)) {
            throw 'Release archive was not created.'
          }
